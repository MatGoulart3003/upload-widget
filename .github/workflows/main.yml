name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout_code
        uses: actions/checkout@v7

      - name: Configure node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        id: indtall-pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        id: install-dependencies
        run: pnpm install

      - name: Build project
        id: build-project
        run: pnpm build

      - name: Configure AWS credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync files to S3 static
        id: sync-files-to-s3-static
        run: aws s3 sync ${{ vars.SOURCE_DIST }} s3://${{ vars.CLOUDFRONT_BUCKET_NAME }}  --delete

      - name: Sync files to S3 CloudFront
        id: sync-files-to-s3-cdn
        run: aws s3 sync ${{ vars.SOURCE_DIST }} s3://${{ secrets.STATIC_BUCKET_NAME }}  --delete
          
